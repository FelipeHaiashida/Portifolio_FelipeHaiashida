const state = { videoModal: null };

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escAttr(s) { return esc(s).replace(/\n/g, " "); }
function nl2br(s) { return esc(s).split("\n").join("<br>"); }

function parseVideo(url) {
  if (!url || typeof url !== "string") return null;
  const u = url.trim();
  if (!u) return null;

  const yt = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([^&\n?#]+)/);
  if (yt) return { type: "iframe", src: `https://www.youtube.com/embed/${yt[1]}?rel=0&modestbranding=1` };

  const vm = u.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (vm) return { type: "iframe", src: `https://player.vimeo.com/video/${vm[1]}` };

  if (/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(u)) return { type: "video", src: u };

  if (u.startsWith("http")) return { type: "iframe", src: u };

  return null;
}

function renderVideoPreview(video, i, pid) {

    : `<video src="${esc(video.src)}" class="w-full h-full object-cover" muted playsinline preload="metadata"></video>`;

  return `
    <button data-action="play-video" data-pid="${esc(pid)}" class="w-full h-full relative cursor-pointer block">

      <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-black/30 flex items-center justify-center">

    </button>
  `;
}

    <div data-action="close-modal" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 md:p-8">
      <button data-action="close-modal" class="absolute top-4 right-4 p-3 rounded-full bg-neutral-900 border border-neutral-800 hover:border-amber-400/60 transition-colors text-xl leading-none w-10 h-10 flex items-center justify-center">×</button>
      <div data-stop-propagation class="w-full max-w-5xl aspect-video bg-black">${inner}</div>
    </div>
  `;
}

function fullRender() {
  document.getElementById("app").innerHTML = renderApp();
}

document.body.addEventListener("click", e => {
  if (state.videoModal) {
    const stop = e.target.closest("[data-stop-propagation]");
    const close = e.target.closest('[data-action="close-modal"]');
    if (close && !stop) { state.videoModal = null; fullRender(); return; }
    if (!stop) { state.videoModal = null; fullRender(); return; }
  }

  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === "play-video") {
    const pid = btn.dataset.pid;
    const proj = DATA.projects.find(x => x.id === pid);
    if (proj) {
      const v = parseVideo(proj.videoUrl);
      if (v) { state.videoModal = v; fullRender(); }
    }
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape" && state.videoModal) {
    state.videoModal = null;
    fullRender();
  }
});

fullRender();
</script>
</body>
</html>
